# PermissionsExPlus — starter config.yml (place in plugins/PermissionsEx/config.yml)

permissions:
  command-framework: modern
  debug: false
  allowOps: false
  user-add-groups-last: false
  log-players: true
  createUserRecords: true
  save-default-group: true
  backend: local
  basedir: plugins/PermissionsEx
  informplayers:
    changes: false
  backends:
    local:
      type: local
      database: permissions
      migration-source: permissions.yml
